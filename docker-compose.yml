name: 3ds2-demo

# Backend は profile で切替する設計（現状は laravel のみ実装）。
# 既定では COMPOSE_PROFILES=laravel を .env で設定し、`docker compose up` で全体起動できる。
# 別言語 backend を追加する場合は、対応 profile を持つサービスを足せばよい。

services:
  mysql:
    image: mysql:8.4
    container_name: 3ds2-demo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-threeds2_demo}
      MYSQL_USER: ${MYSQL_USER:-laravel}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-laravel}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend-laravel:
    build:
      context: .
      dockerfile: docker/backend-laravel/Dockerfile
    image: 3ds2-demo/backend-laravel:dev
    container_name: 3ds2-demo-backend-laravel
    profiles: ["laravel"]
    working_dir: /var/www/html
    volumes:
      - ./backend-laravel:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx:
    image: nginx:1.27-alpine
    container_name: 3ds2-demo-nginx
    profiles: ["laravel"]
    ports:
      - "${BACKEND_PORT:-8000}:80"
    volumes:
      - ./backend-laravel:/var/www/html:ro
      - ./docker/backend-laravel/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend-laravel

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    image: 3ds2-demo/frontend:dev
    container_name: 3ds2-demo-frontend
    working_dir: /app
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      # Vite から見た backend のオリジン（ホスト側で公開されているポート）
      VITE_BACKEND_ORIGIN: ${VITE_BACKEND_ORIGIN:-http://localhost:8000}

volumes:
  mysql_data:
  frontend_node_modules:
