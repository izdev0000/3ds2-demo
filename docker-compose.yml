name: 3ds2-demo

# Backend は profile で切替する設計（現状は laravel のみ実装）。
# 既定では COMPOSE_PROFILES=laravel を .env で設定し、`docker compose up` で全体起動できる。
# 別言語 backend を追加する場合は、対応 profile を持つサービスを足せばよい。

services:
  mysql:
    image: mysql:8.4
    container_name: 3ds2-demo-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-threeds2_demo}
      MYSQL_USER: ${MYSQL_USER:-laravel}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-laravel}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # 初回起動時に PHPUnit 用の test DB 等を作成する SQL を実行する
      # (既存 mysql_data volume が残っている環境では走らない点に注意。
      #  その場合は SQL ファイル先頭のコメントの手順で手動実行する)
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend-laravel:
    build:
      context: .
      dockerfile: docker/backend-laravel/Dockerfile
    image: 3ds2-demo/backend-laravel:dev
    container_name: 3ds2-demo-backend-laravel
    profiles: ["laravel"]
    working_dir: /var/www/html
    volumes:
      - ./backend-laravel:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  nginx:
    image: nginx:1.27-alpine
    container_name: 3ds2-demo-nginx
    profiles: ["laravel"]
    ports:
      - "${BACKEND_PORT:-8000}:80"
    volumes:
      - ./backend-laravel:/var/www/html:ro
      - ./docker/backend-laravel/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend-laravel

  stripe-cli:
    image: stripe/stripe-cli:latest
    container_name: 3ds2-demo-stripe-cli
    profiles: ["laravel"]
    # 起動毎に新しい webhook signing secret (whsec_...) がログに表示されるため、
    # 初回は `docker compose logs stripe-cli` で確認し backend-laravel/.env の
    # STRIPE_WEBHOOK_SECRET に転記する運用とする（学習デモのため自動化はしない）。
    command: >-
      listen
      --forward-to nginx:80/api/webhooks/stripe
      --skip-verify
    environment:
      STRIPE_API_KEY: ${STRIPE_API_KEY:-}
      STRIPE_DEVICE_NAME: 3ds2-demo
    depends_on:
      nginx:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    image: 3ds2-demo/frontend:dev
    container_name: 3ds2-demo-frontend
    working_dir: /app
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      # Vite から見た backend のオリジン（ホスト側で公開されているポート）
      VITE_BACKEND_ORIGIN: ${VITE_BACKEND_ORIGIN:-http://localhost:8000}
      # Stripe.js が利用する publishable key（pk_test_...）
      VITE_STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}

volumes:
  mysql_data:
  frontend_node_modules:
