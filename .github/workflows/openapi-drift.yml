name: openapi-drift

on:
  push:
    branches: [main]
    paths:
      - 'docs/api-contract.yaml'
      - '.spectral.yaml'
      - '.github/workflows/openapi-drift.yml'
  pull_request:
    paths:
      - 'docs/api-contract.yaml'
      - '.spectral.yaml'
      - '.github/workflows/openapi-drift.yml'

jobs:
  spectral:
    name: Spectral OpenAPI lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Run Spectral
        run: npx -y @stoplight/spectral-cli@latest lint docs/api-contract.yaml
