name: frontend-test

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-test.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-test.yml'

jobs:
  vitest:
    name: vue-tsc + vitest
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies (frozen)
        run: npm ci

      - name: Type check (vue-tsc --build)
        run: npm run type-check

      - name: Run unit tests (vitest run)
        run: npx vitest run
